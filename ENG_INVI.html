<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthikeyan ❤️ Akshaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c9184a;
            --accent: #ff4d6d;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #000;
            font-family: 'Arima', cursive;
            overflow: hidden;
        }

        /* 1. Background Layer */
        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('ENGAGEMENT.png') no-repeat center center;
            background-size: cover;
            filter: blur(15px) brightness(0.5);
            transform: scale(1.1);
            z-index: 1;
            transition: all 2.5s ease;
        }

        /* 2. Floating Petals Animation */
        .petal {
            position: fixed;
            background-color: #ff4d6d;
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            z-index: 2;
            animation: drift 10s infinite linear;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) rotate(0deg); left: 10%; }
            100% { transform: translateY(110vh) rotate(360deg); left: 90%; }
        }

        /* 3. Reveal Content */
        #wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #invite-img {
            max-width: 90%;
            max-height: 80vh;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 15px;
            display: none;
            opacity: 0;
            transition: transform 10s infinite alternate; /* The 'breathing' effect */
        }

        /* Initial Text & Button */
        #overlay-text { text-align: center; color: white; transition: opacity 1s; }

        .kavidhai {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            margin-bottom: 40px;
            animation: fadeInOut 3s infinite ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }

        .btn-open {
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        /* Revealed States */
        .revealed #bg-container { filter: blur(5px) brightness(0.3); }
        .revealed #invite-img { 
            display: block; 
            opacity: 1; 
            animation: zoomIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), breathing 15s infinite alternate 1.5s; 
        }
        
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes breathing { from { transform: scale(1); } to { transform: scale(1.05); } }

        #map-btn {
            display: none;
            margin-top: 30px;
            background: white;
            color: var(--primary);
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            animation: slideUp 1s ease forwards;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .revealed #map-btn { display: inline-block; }
    </style>
</head>
<body id="body-tag">

    <div id="bg-container"></div>

    <script>
        for (let i = 0; i < 15; i++) {
            let p = document.createElement('div');
            p.className = 'petal';
            p.style.width = Math.random() * 15 + 10 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = Math.random() * 5 + 7 + 's';
            document.body.appendChild(p);
        }
    </script>

    <div id="wrapper">
        <div id="overlay-text">
            <div class="kavidhai">
                இரு மனங்கள் இணையும்
	இனியதொரு தொடக்கம்..... ❤️ <br>
                <span style="font-size: 0.7em;">A beautiful journey begins</span>
            </div>
            <button class="btn-open" onclick="reveal()">நிச்சயதார்த்த அழைப்பிதழ் <br> (Open Invitation)</button>
        </div>

        <img src="ENGAGEMENT.png" id="invite-img" alt="Invitation">
        
        <a id="map-btn" href="https://maps.app.goo.gl/YourActualGoogleMapsLink" target="_blank">
            📍 View Venue Location
        </a>
    </div>

    <script>
        function reveal() {
            document.getElementById('body-tag').classList.add('revealed');
            document.getElementById('overlay-text').style.display = 'none';
        }
    </script>
</body>
</html>
